<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 Spin & Win | Dove x Pears</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="branding-bar">
        <img src="Images/Pears Logo-01.png" alt="Pears" class="brand-logo pears">
        <img src="Images/Dove new logo_090524.png" alt="Dove" class="brand-logo dove">
    </div>

    <div id="landing-page" class="page active">
        <div class="simple-card">
            <img src="Images/Asset 3.png" alt="FIFA" class="card-asset-3">
            <img src="Images/Asset 4.png" alt="Asset 4" class="asset-4-img">
            <button id="start-game" class="btn-primary">Enter Game</button>
        </div>
    </div>

    <div id="game-page" class="page">
        <div class="game-container">
            <img src="Images/Asset 3.png" alt="FIFA" class="game-asset-3">
            <div class="wheel-wrapper">
                <div id="wheel" class="wheel">
                    <!-- Segments generated via JS -->
                </div>
                <div class="pointer"></div>
                <button id="spin-btn" class="spin-center">
                    <img src="Images/football.png" alt="Spin" class="center-ball">
                </button>
            </div>
            <div id="result-overlay" class="overlay hidden">
                <div class="result-card">
                    <h2 id="win-title">GOAL!</h2>
                    <p id="win-text"></p>
                    <button id="reset-btn" class="btn-primary">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
