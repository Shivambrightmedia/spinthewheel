<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Spin the Wheel Config</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at center, #00529b 0%, #001a33 100%);
            color: #333;
            min-height: 100vh;
            overflow-y: auto;
            padding: 40px 20px;
            font-family: 'Outfit', sans-serif;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 2.5rem;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .config-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1rem;
            align-items: center;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 1rem;
            transition: transform 0.2s;
        }

        .config-row:hover {
            transform: scale(1.01);
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .config-header {
            font-weight: 800;
            background: var(--primary);
            color: white;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        input {
            background: #fff;
            border: 2px solid #e0e0e0;
            color: #333;
            padding: 0.8rem;
            border-radius: 0.8rem;
            width: 100%;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        label {
            font-weight: 700;
            color: #2d3436;
            display: block;
            margin-bottom: 0.5rem;
        }

        .save-section {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .date-picker {
            margin-bottom: 3rem;
            background: #eff6ff;
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid #dbeafe;
        }

        .btn-primary {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(135deg, var(--primary), #003d73);
            color: white;
            border: none;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 82, 155, 0.2);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 82, 155, 0.3);
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <h1>Admin Dashboard</h1>
        <div class="date-picker">
            <label>Configure for Date:</label>
            <input type="date" id="config-date">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                <div>
                    <label>Start Hour (0-23):</label>
                    <input type="number" id="start-hour" value="10" min="0" max="23">
                </div>
                <div>
                    <label>End Hour (0-23):</label>
                    <input type="number" id="end-hour" value="22" min="0" max="23">
                </div>
            </div>
        </div>

        <div id="segments-config">
            <!-- JS will populate rows for 8 segments -->
        </div>

        <div class="save-section">
            <button id="save-config" class="btn-primary">Save Configuration</button>
            <a href="index.html" style="color: var(--primary); display: block; margin-top: 1rem; font-weight: 700; text-decoration: none; border-bottom: 2px solid transparent; transition: border-color 0.3s;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='transparent'">← Back to Game</a>
        </div>
    </div>

    <script>
        const segments = [
            "Cap", "Jersey", "Football", "Better Luck",
            "Cap", "Jersey", "Football", "Spin Again"
        ];
        const container = document.getElementById('segments-config');
        const dateInput = document.getElementById('config-date');
        const startHourInput = document.getElementById('start-hour');
        const endHourInput = document.getElementById('end-hour');

        // Set default date to today
        dateInput.valueAsDate = new Date();

        function renderRows() {
            container.innerHTML = '<div class="config-row config-header"><span>Segment</span><span>Daily Limit</span><span>Weight (0-100)</span></div>';
            segments.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'config-row';
                row.innerHTML = `
                    <span>${i + 1}. ${s}</span>
                    <input type="number" class="limit" data-idx="${i}" placeholder="Unlimited">
                    <input type="number" class="weight" data-idx="${i}" value="10">
                `;
                container.appendChild(row);
            });
        }

        function loadConfig() {
            const date = dateInput.value;
            const config = JSON.parse(localStorage.getItem(`config_${date}`)) || {};

            startHourInput.value = config.timings?.start ?? 10;
            endHourInput.value = config.timings?.end ?? 22;

            document.querySelectorAll('.limit').forEach(input => {
                const idx = input.dataset.idx;
                input.value = config[idx]?.limit || '';
            });
            document.querySelectorAll('.weight').forEach(input => {
                const idx = input.dataset.idx;
                input.value = config[idx]?.weight || 10;
            });
        }

        dateInput.addEventListener('change', loadConfig);

        document.getElementById('save-config').addEventListener('click', () => {
            const date = dateInput.value;
            const config = {
                timings: {
                    start: parseInt(startHourInput.value),
                    end: parseInt(endHourInput.value)
                }
            };
            document.querySelectorAll('.limit').forEach(input => {
                const idx = input.dataset.idx;
                const weight = document.querySelector(`.weight[data-idx="${idx}"]`).value;
                config[idx] = {
                    limit: input.value ? parseInt(input.value) : null,
                    weight: parseInt(weight) || 0
                };
            });
            localStorage.setItem(`config_${date}`, JSON.stringify(config));
            alert('Config saved for ' + date);
        });

        renderRows();
        loadConfig();
    </script>
</body>

</html>
