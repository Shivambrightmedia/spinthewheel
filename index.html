<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 Spin & Win | Dove x Pears</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="branding-bar">
        <img src="Images/Dove new logo_090524.jpg" alt="Dove" class="brand-logo">
        <img src="Images/Pears Logo-01.png" alt="Pears" class="brand-logo">
    </div>

    <div id="landing-page" class="page active">
        <div class="simple-card">
            <img src="Images/Dove X Pears FIFA Logo Unit & Text.jpg" alt="FIFA '26 SPIN & WIN" class="campaign-banner">
            <button id="start-game" class="btn-primary">Enter Game</button>
        </div>
    </div>

    <div id="game-page" class="page">
        <div class="game-container">
            <div class="wheel-wrapper">
                <div id="wheel" class="wheel">
                    <!-- Segments generated via JS -->
                </div>
                <div class="pointer"></div>
                <button id="spin-btn" class="spin-center">SPIN</button>
            </div>
            <div id="result-overlay" class="overlay hidden">
                <div class="result-card">
                    <h2 id="win-title">GOAL! 🎉</h2>
                    <p id="win-text"></p>
                    <button id="reset-btn" class="btn-primary">Play Again 🔄</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
