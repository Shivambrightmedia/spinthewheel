<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Spin the Wheel Config</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #f4f7f6;
            background-image: none;
            color: #333;
            height: auto;
            overflow: auto;
            padding: 20px;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 2rem;
            text-align: center;
            background: none;
            -webkit-text-fill-color: initial;
        }

        .config-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        input {
            background: #fff;
            border: 1px solid #ccc;
            color: #333;
            padding: 0.7rem;
            border-radius: 0.5rem;
            width: 100%;
        }

        label {
            font-weight: 600;
            color: #636e72;
            display: block;
            margin-bottom: 0.5rem;
        }

        .save-section {
            margin-top: 3rem;
            text-align: center;
        }

        .date-picker {
            margin-bottom: 3rem;
            background: #f9f9f9;
            padding: 1.5rem;
            border-radius: 0.8rem;
        }

        .btn-primary {
            width: 100%;
            max-width: 300px;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <h1>Admin Dashboard</h1>
        <div class="date-picker">
            <label>Configure for Date:</label>
            <input type="date" id="config-date">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                <div>
                    <label>Start Hour (0-23):</label>
                    <input type="number" id="start-hour" value="10" min="0" max="23">
                </div>
                <div>
                    <label>End Hour (0-23):</label>
                    <input type="number" id="end-hour" value="22" min="0" max="23">
                </div>
            </div>
        </div>

        <div id="segments-config">
            <!-- JS will populate rows for 8 segments -->
        </div>

        <div class="save-section">
            <button id="save-config" class="btn-primary">Save Configuration</button>
            <a href="index.html" style="color: #6c5ce7; display: block; margin-top: 1rem; font-weight: 600;">Back to
                Game</a>
        </div>
    </div>

    <script>
        const uniqueGoodies = [
            "Cap", "Jersey", "Football", "Better Luck", "Spin Again"
        ];
        const container = document.getElementById('segments-config');
        const dateInput = document.getElementById('config-date');
        const startHourInput = document.getElementById('start-hour');
        const endHourInput = document.getElementById('end-hour');

        // Set default date to today
        dateInput.valueAsDate = new Date();

        function renderRows() {
            container.innerHTML = '<div class="config-row"><strong>Prize</strong><strong>Daily Limit</strong><strong>Weight (0-100)</strong></div>';
            uniqueGoodies.forEach((s) => {
                const row = document.createElement('div');
                row.className = 'config-row';
                row.innerHTML = `
                    <span>${s}</span>
                    <input type="number" class="limit" data-name="${s}" placeholder="Unlimited">
                    <input type="number" class="weight" data-name="${s}" value="10">
                `;
                container.appendChild(row);
            });
        }

        function loadConfig() {
            const date = dateInput.value;
            const config = JSON.parse(localStorage.getItem(`config_${date}`)) || {};

            startHourInput.value = config.timings?.start ?? 10;
            endHourInput.value = config.timings?.end ?? 22;

            document.querySelectorAll('.limit').forEach(input => {
                const name = input.dataset.name;
                input.value = config[name]?.limit || '';
            });
            document.querySelectorAll('.weight').forEach(input => {
                const name = input.dataset.name;
                input.value = config[name]?.weight !== undefined ? config[name].weight : 10;
            });
        }

        dateInput.addEventListener('change', loadConfig);

        document.getElementById('save-config').addEventListener('click', () => {
            const date = dateInput.value;
            const config = {
                timings: {
                    start: parseInt(startHourInput.value),
                    end: parseInt(endHourInput.value)
                }
            };
            document.querySelectorAll('.limit').forEach(input => {
                const name = input.dataset.name;
                const weight = document.querySelector(`.weight[data-name="${name}"]`).value;
                config[name] = {
                    limit: input.value ? parseInt(input.value) : null,
                    weight: parseInt(weight) || 0
                };
            });
            localStorage.setItem(`config_${date}`, JSON.stringify(config));
            alert('Config saved for ' + date);
        });

        renderRows();
        loadConfig();
    </script>
</body>

</html>
